    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="220" fill="url(#blue)" opacity="0.08" />
  <circle cx="150" cy="560" r="260" fill="url(#blue)" opacity="0.06" />
  <circle cx="1050" cy="100" r="120" fill="url(#blue)" opacity="0.07" />
  <!-- Badge -->
  <rect x="120" y="160" width="200" height="36" rx="18" fill="#3b82f6" fill-opacity="0.15" />
  <rect x="120" y="160" width="200" height="36" rx="18" fill="none" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4" />
  <circle cx="148" cy="178" r="5" fill="#3b82f6" />
  <text x="162" y="183" font-size="13" font-family="Space Grotesk, system-ui, sans-serif" fill="#60a5fa" font-weight="500">Freelance disponible</text>
  <!-- Main title -->
  <text x="120" y="280" font-size="72" font-family="Space Grotesk, system-ui, sans-serif" fill="#f0ebe6" font-weight="600">GRDN Freelance</text>
