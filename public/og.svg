  <text x="120" y="484" font-size="13" font-family="Space Grotesk, system-ui, sans-serif" fill="#6b7280">Newsletter Klaviyo · 50% taux d'ouverture</text>
  <text x="380" y="460" font-size="16" font-family="Space Grotesk, system-ui, sans-serif" fill="#3b82f6" font-weight="600">100+ produits</text>
  <text x="380" y="484" font-size="13" font-family="Space Grotesk, system-ui, sans-serif" fill="#6b7280">Migration Shopify · 4 mois</text>
